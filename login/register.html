<!DOCTYPE html>
<html>

<head>
    <title>Smart Budget - Register</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/images/favicon.png">
    <link rel="stylesheet" href="../styles/style.css">
</head>


    <div id="header"></div>
    </head>

    <body class="auth-page">

    <main class="page-content">

        <h1>Smart Budget</h1>
        <h2>Create Account</h2>

        <form id="registerForm" class="auth-form" autocomplete="off">
            <input type="text" id="newUsername" placeholder="Username" required autocomplete="off">
            <br><br>
            <div class="password-container">
                <input type="password" id="newPassword" placeholder="Password" required autocomplete="new-password">
                <span id="toggleRegisterPassword" class="toggle-eye">Show</span>
            </div>
            <br><br>

            <button type="submit">Register</button>
        </form>


        <p id="message"></p>

        <p>Already have an account? <a href="../login/login.html">Login Here</a></p>

    </main>

        <script src="../scripts/register.js"></script>


        <script>
            // Show/hide password with animation
            const toggleRegisterPassword = document.getElementById("toggleRegisterPassword");
            const registerPasswordInput = document.getElementById("newPassword");

            toggleRegisterPassword.addEventListener("click", () => {
                if (registerPasswordInput.type === "password") {
                    registerPasswordInput.type = "text";
                    toggleRegisterPassword.textContent = "Hide";
                } else {
                    registerPasswordInput.type = "password";
                    toggleRegisterPassword.textContent = "Show";
                }
            });
        </script>
        <script src="../scripts/headerFooter.js"></script>
        <div id="footer"></div>
    </body>

</html>
