<!DOCTYPE html>
<html>

<head>
    <title>Smart Budget - Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/images/favicon.png">
    <link rel="stylesheet" href="../styles/style.css">
</head>

<body class="auth-page">
    <div id="header"></div>
    <h1>Smart Budget</h1>
    <h2>Login</h2>

    <form id="loginForm" class="auth-form" autocomplete="off">
        <input type="text" id="username" placeholder="Username" required autocomplete="off">
        <br><br>

        <div class="password-container">
            <input type="password" id="password" placeholder="Password" required autocomplete="new-password">
            <span id="togglePassword" class="toggle-eye">Show</span>
        </div>
        <br><br>
        <button type="submit">Login</button>
    </form>


    <hr>
    <p>Or sign in with</p>
    <div style="text-align: center;">
        <button class="social-btn google" onclick="googleLogin()">
            Login with Google
        </button>
        <button class="social-btn apple" onclick="appleLogin()">
            Login with Apple
        </button>


       
    </div>

    <p id="message"></p>

    <p>Don't have an account?
        <a href="register.html">Register Here</a>
    </p>

<script src="../scripts/login.js"></script>
<script>
  //toggle password visibility
    const togglePassword = document.getElementById("togglePassword");
    const passwordInput = document.getElementById("password");

  
        togglePassword.addEventListener("click", () => {
            if (passwordInput.type === "password") {
                passwordInput.type = "text";
                togglePassword.textContent = "Hide";
            } else {
                passwordInput.type = "password";
                togglePassword.textContent = "Show";
            }
        });

    </script>
    <script src="../scripts/headerFooter.js"></script>
    <div id="footer"></div>
</body>

</html>
