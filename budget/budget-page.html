<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Budget Page</title>
    <link rel="stylesheet" href="../styles/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div id="header"></div>

    <!-- Transaction Form -->
    <section>
        <h2>Add Transaction</h2>

        <form id="transaction-form">
            <label>
                Date:
                <input type="date" id="date-input" required>
            </label>
            <br>

            <label>
                Description:
                <input type="text" id="description-input" required>
            </label>
            <br>

            <label>
                Amount:
                <input type="number" id="amount-input" step="0.01" required>
            </label>
            <br>

            <label>
                Category:
                <input type="text" id="category-input" required>
            </label>
            <br>

            <button type="submit">Add Transaction</button>
        </form>
    </section>

    <!-- Transactions Table -->
    <section>
        <h2>Transactions</h2>

        <table border="1" cellpadding="8">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Description</th>
                    <th>Amount</th>
                    <th>Category</th>
                    <th>Update</th>
                    <th>Delete</th>
                </tr>
            </thead>

            <tbody id="transaction-table-body">
                <!-- PlaceHolder Data Row 1 -->
                <tr>
                    <td>2026-03-01</td>
                    <td>Groceries</td>
                    <td>$85.20</td>
                    <td>Food</td>
                    <td>
                        <img src="update-icon.png" alt="Update" width="20" />
                    </td>
                    <td>
                        <svg class="delete-btn" width="20" height="20" viewBox="0 0 24 24">
                            <path fill="red" d="M3 6h18v2H3zm2 3h14l-1.5 12h-11zM9 4h6v2H9z" />
                        </svg>
                    </td>
                </tr>

                <!-- PlaceHolder Data Row 2 -->
                <tr>
                    <td>2026-03-02</td>
                    <td>Gas</td>
                    <td>$42.10</td>
                    <td>Transportation</td>
                    <td>
                        <img src="update-icon.png" alt="Update" width="20" />
                    </td>
                    <td>
                        <svg class="delete-btn" width="20" height="20" viewBox="0 0 24 24">
                            <path fill="red" d="M3 6h18v2H3zm2 3h14l-1.5 12h-11zM9 4h6v2H9z" />
                        </svg>
                    </td>
                </tr>

                <!-- PlaceHolder Data Row 3 -->
                <tr>
                    <td>2026-03-03</td>
                    <td>Mortgage</td>
                    <td>$5.75</td>
                    <td>Bills</td>
                    <td>
                        <img src="update-icon.png" alt="Update" width="20" />
                    </td>
                    <td>
                        <svg class="delete-btn" width="20" height="20" viewBox="0 0 24 24">
                            <path fill="red" d="M3 6h18v2H3zm2 3h14l-1.5 12h-11zM9 4h6v2H9z" />
                        </svg>
                    </td>
                </tr>
            </tbody>
            <tfoot>
                <tr>
                    <td colspan="2"><strong>Total</strong></td>
                    <td id="total-amount">$0.00</td>
                    <td colspan="3"></td>
                </tr>
            </tfoot>
        </table>

        <!-- Placeholder Canvas for future Piechart to show budget utilization -->
        <canvas id="budgetChart" width="400" height="400"></canvas>

    </section>
    <div id="footer"></div>

    <script src="../scripts/headerFooter.js"></script>
    <script src="../scripts/transaction-CRUD.js"></script>
</body>

</html>
