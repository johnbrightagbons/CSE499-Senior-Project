<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Budget Page</title>
    <link rel="icon" href="/images/favicon.png">
    <link rel="stylesheet" href="../styles/style.css">
</head>

<script>
    const user = localStorage.getItem("loggedInUser");

    if (!user) {
        // 🚫 NOT LOGGED IN → REDIRECT
        alert("You must login first!");
        window.location.href = "../login/login.html";
    }
</script>

<body class="budget-page">
    <div id="header"></div>

    <!-- Transaction Counter-->
    <section>
        <h2>Total Transactions Added</h2>
        <p>Transaction Count: <span id="transaction-counter">0</span></p>
    </section>

    <!-- Transaction Form -->
    <section>
        <h2>Add Transaction</h2>

        <form id="transaction-form">
            <input type="hidden" id="edit-index" value="">
            <label>
                Date:
                <input type="date" id="date-input" required>
            </label>
            <br>

            <label>
                Description:
                <input type="text" id="description-input" required>
            </label>
            <br>

            <label>
                Amount:
                <input type="number" id="amount-input" step="0.01" required>
            </label>
            <br>

            <label>
                Category:
                <input type="text" id="category-input" required>
            </label>
            <br>

            <button type="submit">Add Transaction</button>
        </form>
    </section>

    <!-- Transactions Table -->
    <section>
        <h2>Transactions</h2>

        <table border="1" cellpadding="8">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Description</th>
                    <th>Amount</th>
                    <th>Category</th>
                    <th>Update</th>
                    <th>Delete</th>
                </tr>
            </thead>
